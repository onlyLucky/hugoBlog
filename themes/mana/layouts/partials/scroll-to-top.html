<button id="scroll-to-top" class="scroll-to-top" aria-label="{{ i18n "scrollToTop" }}" type="button">
  <svg class="scroll-progress-ring" viewBox="0 0 48 48" aria-hidden="true">
    <!-- Background circle as button surface -->
    <circle class="progress-bg" cx="24" cy="24" r="22" fill="currentColor" stroke="none"></circle>
    <!-- Progress arc -->
    <circle class="progress-fill" cx="24" cy="24" r="22" fill="none" stroke="var(--accent-primary)" stroke-width="2.5" stroke-linecap="round"></circle>
  </svg>
  <svg class="scroll-arrow" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true">
    <path
      stroke-linecap="round"
      stroke-linejoin="round"
      stroke-width="2"
      d="M5 10l7-7m0 0l7 7m-7-7v18"></path>
  </svg>
</button>
